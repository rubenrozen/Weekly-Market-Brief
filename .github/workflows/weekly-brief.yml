name: Weekly Market Brief — Vendredi 19h Panama

on:
  schedule:
    # Vendredi 19h Panama (UTC-5) = Samedi 00h00 UTC
    - cron: '0 0 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic reportlab requests

      - name: Generate report, PDF and send email
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:     ${{ secrets.ANTHROPIC_MODEL }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          EMAIL_FROM:          ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:            ${{ secrets.EMAIL_TO }}
          FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
        run: python scripts/generate_and_send.py

      - name: Commit latest report JSON to repo
        run: |
          git config user.name "MarketBrief Bot"
          git config user.email "actions@github.com"
          git add data/latest-report.json
          git diff --staged --quiet || git commit -m "chore: update weekly report $(date +'%Y-%m-%d')"
          git push

      - name: Done
        run: echo "✅ Weekly Market Brief v3 généré, envoyé et publié !"
