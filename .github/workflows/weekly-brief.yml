name: Weekly Market Brief — Vendredi 19h Panama

on:
  schedule:
    # Vendredi 19h Panama (UTC-5) = Samedi 00h00 UTC
    - cron: '0 0 * * 6'
  workflow_dispatch:
    # Permet aussi de lancer manuellement depuis GitHub

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic reportlab requests

      - name: Generate report, PDF and send email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python scripts/generate_and_send.py

      - name: Confirm success
        run: echo "✅ Weekly Market Brief généré et envoyé avec succès !"
